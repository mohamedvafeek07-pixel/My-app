<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel App Combined</title>
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#0f172a;color:#fff}
.header{padding:15px;text-align:center;background:#020617}
.page{padding:15px}
.card{background:#1e293b;padding:15px;margin:12px 0;border-radius:16px}
.button{background:#3b82f6;padding:10px;border-radius:10px;text-align:center;margin:8px 0}/* Floating Sheet */ .floating{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%); width:90%; max-width:400px; background:#fff; color:#000; border-radius:20px; padding:15px; box-shadow:0 10px 30px rgba(0,0,0,0.3); }

input{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc} </style>

</head>
<body><div class="header">🚀 Travel Pro</div><div class="page">
<div class="card">
<h3>Home</h3>
<p>Welcome back 👋</p>
<div class="button" onclick="toggleSheet()">Plan Trip</div>
</div><div class="card">
<h3>Recent Trips</h3>
<p>Chennai → Bangalore</p>
</div>
</div><!-- FLOATING SHEET (Plan Trip) --><div id="sheet" class="floating" style="display:none">
<h3>Plan Your Trip ✈️</h3>
<input placeholder="From">
<input placeholder="To">
<div class="button">Search</div>
</div><script>
function toggleSheet(){
let sheet = document.getElementById('sheet');
sheet.style.display = sheet.style.display === 'none' ? 'block' : 'none';
}
</script></body>
</html>
