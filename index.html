<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel App Full</title>
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#0f172a;color:#fff}
.header{padding:15px;text-align:center;background:#020617}
.page{display:none;padding:15px 15px 80px}
.active{display:block}
.card{background:#1e293b;padding:15px;margin:12px 0;border-radius:16px}
.button{background:#3b82f6;padding:10px;border-radius:10px;text-align:center;margin:8px 0}
.nav{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:#020617;padding:10px 0}
.nav button{background:none;border:none;color:#94a3b8}/* Floating Sheet */ .floating{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%); width:90%; max-width:400px; background:#fff; color:#000; border-radius:20px; padding:15px; box-shadow:0 10px 30px rgba(0,0,0,0.3); display:none; }

input{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc} </style>

</head>
<body><div class="header">🚀 Travel Pro</div><!-- HOME --><div id="home" class="page active">
<div class="card">
<h3>Home</h3>
<p>Welcome back 👋</p>
<div class="button" onclick="toggleSheet()">Plan Trip</div>
</div>
</div><!-- ROUTES --><div id="routes" class="page">
<div class="card"><h3>Routes</h3><p>Chennai → Bangalore</p></div>
</div><!-- ALERTS --><div id="alerts" class="page">
<div class="card"><h3>Alerts</h3><p>Bus delayed</p></div>
</div><!-- CROWD --><div id="crowd" class="page">
<div class="card"><h3>Crowd</h3><p>Medium</p></div>
</div><!-- SETTINGS --><div id="settings" class="page">
<div class="card"><h3>Settings</h3><p>Options</p></div>
</div><!-- FLOATING PLAN SHEET --><div id="sheet" class="floating">
<h3>Plan Your Trip ✈️</h3>
<input placeholder="From">
<input placeholder="To">
<div class="button">Search</div>
</div><!-- NAV BAR --><div class="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('routes')">Routes</button>
<button onclick="show('alerts')">Alerts</button>
<button onclick="show('crowd')">Crowd</button>
<button onclick="show('settings')">Settings</button>
</div><script>
function show(page){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(page).classList.add('active');
}
function toggleSheet(){
let sheet=document.getElementById('sheet');
sheet.style.display = sheet.style.display==='block'?'none':'block';
}
</script></body>
</html>
